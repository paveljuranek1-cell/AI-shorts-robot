name: Daily AI Shorts Robot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run robot
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python main.py

      - name: Save generated scenarios
        run: |
          git config --global user.name "AI Shorts Robot"
          git config --global user.email "actions@github.com"
          git add shorts_scenare.json
          git commit -m "Update generated shorts scenarios" || echo "No changes"
          git push
