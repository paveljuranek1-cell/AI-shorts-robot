name: Daily AI Shorts Robot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"


jobs:

  build:

    runs-on: ubuntu-latest


    permissions:
      contents: write


    steps:


      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"



      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg



      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt



      - name: Run AI scenario generator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python main.py



      - name: Save generated scenarios
        run: |
          git config --global user.name "AI Shorts Robot"
          git config --global user.email "actions@github.com"
          git add shorts_scenare.json
          git commit -m "Update generated shorts scenarios" || echo "No changes"
          git push



      - name: Test video generator
        run: |
          python video_generator.py



      - name: Upload generated video
        uses: actions/upload-artifact@v4
        with:
          name: short-video
          path: videos/auto_image_short.mp4
